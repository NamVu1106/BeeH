<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tai nghe - Bee Arena</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Copy toàn bộ CSS từ ban-phim.html */
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #5c6ac4;
            --accent-color: #50b83c;
            --text-color: #212b36;
            --text-light: #637381;
            --light-bg: #f4f6f8;
            --white: #ffffff;
            --border-color: #dfe3e8;
            --success-color: #50b83c;
            --warning-color: #ffb82e;
            --danger-color: #de3618;
        }
        /* ... Copy toàn bộ CSS từ ban-phim.html ... */
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-4">Tai nghe</h1>
        <div class="row g-4" id="productsContainer">
            <!-- Sản phẩm sẽ được render bằng JavaScript -->
        </div>
    </div>

    <script>
        // Tạo 50 sản phẩm tai nghe
        const products = Array.from({length: 50}, (_, i) => {
            const brands = ['Sony', 'JBL', 'Razer', 'Logitech', 'Corsair', 'Rapoo'];
            const brand = brands[i % brands.length];
            const discountPercent = [30, 35, 40, 45, 50][i % 5];
            const originalPrice = Math.floor(Math.random()*2000+2000)*1000;
            const salePrice = Math.floor(originalPrice * (1 - discountPercent/100));
            return {
                id: 1000 + i,
                name: `Tai nghe ${brand} ${i + 1}`,
                price: `${(Math.random()*2000+500).toFixed(0)}.000đ`,
                img: "https://m.media-amazon.com/images/I/61UxfXTUyvL._AC_SL1500_.jpg",
                category: 'tainghe',
                discountPercent,
                originalPrice,
                salePrice,
                specs: {
                    'Kết nối': i % 2 === 0 ? 'Không dây' : 'Có dây',
                    'Driver': '50mm',
                    'Led': 'RGB 16.8 triệu màu',
                    'Pin': '70 giờ',
                    'Kích thước': '200 x 180 x 85mm',
                    'Trọng lượng': '350g',
                    'Bảo hành': '24 tháng'
                }
            };
        });

        // Render sản phẩm
        function renderProducts() {
            const container = document.getElementById('productsContainer');
            container.innerHTML = '';
            products.forEach(p => {
                const col = document.createElement('div');
                col.className = 'col-12 col-sm-6 col-md-4 col-lg-3';
                col.innerHTML = `
                    <div class="card h-100">
                        <img src="${p.img}" class="card-img-top" alt="${p.name}">
                        <div class="card-body">
                            <h5 class="card-title">${p.name}</h5>
                            <p class="card-text old-price">${p.originalPrice.toLocaleString('vi-VN')}đ</p>
                            <p class="card-text price">${p.salePrice.toLocaleString('vi-VN')}đ</p>
                            <button class="btn btn-primary w-100" onclick="addToCart(${p.id})">
                                <i class="fas fa-cart-plus"></i> Thêm vào giỏ hàng
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(col);
            });
        }

        // Khởi tạo trang
        document.addEventListener('DOMContentLoaded', function() {
            renderProducts();
        });

        // Hàm thêm vào giỏ hàng
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (product) {
                fetch('/cart/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        productId: product.id,
                        productName: product.name,
                        price: product.salePrice,
                        quantity: 1
                    })
                })
                .then(response => response.json())
                .then(data => {
                    alert('Đã thêm vào giỏ hàng!');
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Có lỗi xảy ra khi thêm vào giỏ hàng!');
                });
            }
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
